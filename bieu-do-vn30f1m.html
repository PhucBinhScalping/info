<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ kỹ thuật Phái sinh - Phúc Bình Scalping</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #131722; color: #ffffff; font-family: Arial, sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }
        /* Thanh Header chính */
        .header {
            height: 45px; background-color: #1c2030; display: flex;
            align-items: center; padding: 0 20px; justify-content: space-between;
            border-bottom: 1px solid #2b3040; box-sizing: border-box;
        }
        .header .back-link {
            color: #ff9800; text-decoration: none; font-weight: bold; font-size: 14px;
        }
        
        /* Thanh Menu Tab Con */
        .tab-menu {
            height: 40px; background-color: #171b26; display: flex;
            align-items: center; padding: 0 10px; gap: 5px;
            border-bottom: 1px solid #232733; box-sizing: border-box;
        }
        .tab-item {
            background: none; border: none; color: #d1d4dc; padding: 8px 16px;
            font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 4px;
            transition: 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .tab-item:hover { background-color: #2a2e39; color: #ffffff; }
        .tab-item.active {
            background-color: #242b42; color: #2962ff; border-bottom: 2px solid #2962ff;
            border-radius: 4px 4px 0 0;
        }

        /* Vùng nội dung chia đôi theo chiều ngang */
        .content-container {
            flex: 1; width: 100%; height: calc(100% - 85px); 
            display: flex; flex-direction: row; background-color: #131722;
        }
        
        /* Phần chứa Biểu đồ bên trái */
        .chart-section { flex: 1; height: 100%; position: relative; }
        .chart-wrapper { display: none; width: 100%; height: 100%; }
        .chart-wrapper.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        /* PANEL HIỂN THỊ GIÁ LỚN BÊN PHẢI ĐỂ LIVESTREAM */
        .sidebar-panel {
            width: 340px; height: 100%; background-color: #ffffff; color: #333333;
            border-left: 1px solid #e0e3eb; box-sizing: border-box;
            display: flex; flex-direction: column; padding: 16px; box-sizing: border-box;
        }
        
        .stock-title { font-size: 24px; font-weight: bold; color: #00b060; margin-bottom: 2px; }
        .stock-sub { font-size: 13px; color: #666666; margin-bottom: 15px; }
        
        /* Vùng giá hiện tại siêu lớn */
        .price-large-box { margin-bottom: 15px; }
        .price-now { font-size: 46px; font-weight: bold; color: #00b060; line-height: 1; }
        .price-change { font-size: 16px; font-weight: bold; color: #00b060; margin-top: 5px; }

        /* Bảng thông số chi tiết */
        .info-grid { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .info-grid td { padding: 10px 0; border-bottom: 1px solid #f1f1f1; font-size: 14px; font-weight: 500; }
        .info-label { color: #666666; text-align: left; }
        .info-value { text-align: right; font-weight: bold; }

        /* Các ô màu cố định cho Trần, Sàn, TC */
        .row-3col { display: flex; justify-content: space-between; text-align: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f1f1f1; }
        .col-item { flex: 1; }
        .col-label { font-size: 12px; color: #666666; margin-bottom: 4px; }
        .col-val { font-size: 15px; font-weight: bold; }
        
        /* Màu chuẩn chứng khoán */
        .c-tc { color: #f5a623; }   /* Vàng tham chiếu */
        .c-tran { color: #b800e6; } /* Tím trần */
        .c-san { color: #00b0ff; }  /* Xanh lơ sàn */
        .c-up { color: #00b060; }   /* Xanh tăng */
        .c-down { color: #ea0017; } /* Đỏ giảm */
    </style>
</head>
<body>

    <!-- Thanh Header chính -->
    <div class="header">
        <a href="index.html" class="back-link" style="flex: 1; text-align: left;">⬅ Quay lại Trang chủ</a>
        <div style="flex: 2; text-align: center; font-size: 18px; font-weight: 500; color: #ffb700; letter-spacing: 0.5px;">
             Hệ thống Theo dõi Dữ liệu Phái sinh Real-time
        </div>
        <div style="flex: 1; text-align: right; font-size: 18px; font-weight: bold; color: #ffb700;">
            SĐT: 0853.525.379 - ID VPS: BOR5
        </div>
    </div>

    <!-- Thanh Menu 3 Tab Con (Có gắn thêm mã định danh data-symbol) -->
    <div class="tab-menu">
        <button class="tab-item active" data-symbol="VN30F1M" onclick="switchTab(event, 'vn30f1m_5m')">📊 VN30F1M (5 Phút)</button>
        <button class="tab-item" data-symbol="VN30F1M" onclick="switchTab(event, 'vn30f1m_15m')">📊 VN30F1M (15 Phút)</button>
        <button class="tab-item" data-symbol="VNINDEX" onclick="switchTab(event, 'vnindex')">📈 VNINDEX (Ngày)</button>
    </div>

    <!-- Vùng nội dung chính -->
    <div class="content-container">
        
        <!-- BÊN TRÁI: Khu vực chứa biểu đồ -->
        <div class="chart-section">
            <div id="vn30f1m_5m" class="chart-wrapper active">
                <iframe src="https://web5.vps.com.vn/?sym=VN30F1M&interval=5&theme=light&lang=vi"></iframe>
            </div>
            <div id="vn30f1m_15m" class="chart-wrapper">
                <iframe src="https://web5.vps.com.vn/?sym=VN30F1M&interval=15&theme=light&lang=vi"></iframe>
            </div>
            <div id="vnindex" class="chart-wrapper">
                <iframe src="https://web5.vps.com.vn/?sym=VNINDEX&interval=D&theme=light&lang=vi"></iframe>
            </div>
        </div>

        <!-- BÊN PHẢI: BẢNG GIÁ BIẾN ĐỔI THEO TAB ĐANG CHỌN -->
        <div class="sidebar-panel">
            <div class="stock-title" id="lbl-symbol">VN30F1M</div>
            <div class="stock-sub" id="lbl-name">VN30 Index Futures Gần nhất</div>

            <div class="price-large-box">
                <div class="price-now c-tc" id="txt-price">--.--</div>
                <div class="price-change c-tc" id="txt-change">--.--</div>
            </div>

            <!-- Hàng 3 cột chính: TC - Trần - Sàn -->
            <div class="row-3col">
                <div class="col-item">
                    <div class="col-label">TC</div>
                    <div class="col-val c-tc" id="txt-tc">--.-</div>
                </div>
                <div class="col-item">
                    <div class="col-label">Trần</div>
                    <div class="col-val c-tran" id="txt-ceiling">--.-</div>
                </div>
                <div class="col-item">
                    <div class="col-label">Sàn</div>
                    <div class="col-val c-san" id="txt-floor">--.-</div>
                </div>
            </div>

            <!-- Bảng thông số chi tiết phía dưới -->
            <table class="info-grid">
                <tr>
                    <td class="info-label">Mở cửa / TB</td>
                    <td class="info-value"><span class="c-tc" id="txt-open">--.-</span> / <span class="c-tc" id="txt-avg">--.-</span></td>
                </tr>
                <tr>
                    <td class="info-label">Thấp / Cao</td>
                    <td class="info-value"><span class="c-tc" id="txt-low">--.-</span> / <span class="c-tc" id="txt-high">--.-</span></td>
                </tr>
                <tr>
                    <td class="info-label">Khối lượng tổng</td>
                    <td class="info-value" id="txt-volume">--</td>
                </tr>
                <tr id="row-foreign">
                    <td class="info-label">KLNN Mua / Bán</td>
                    <td class="info-value"><span id="txt-f-buy">--</span> / <span id="txt-f-sell">--</span></td>
                </tr>
                <tr id="row-oi">
                    <td class="info-label" style="border-bottom: none;">Khối lượng HĐ mở OI</td>
                    <td class="info-value" style="border-bottom: none; color: #1e2026;" id="txt-oi">--</td>
                </tr>
            </table>
        </div>

    </div>

    <script>
        // Biến toàn cục lưu trữ mã chứng khoán hiện tại đang xem (mặc định mở lên là phái sinh)
        let currentActiveSymbol = "VN30F1M";

        // Hàm xử lý khi người dùng Click đổi Tab
        function switchTab(event, tabId) {
            // 1. Đổi active class cho nút bấm và hiển thị đúng Chart
            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.querySelectorAll('.chart-wrapper').forEach(chart => chart.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            // 2. Đọc xem tab này yêu cầu hiển thị giá mã nào (VN30F1M hay VNINDEX)
            const targetSymbol = event.currentTarget.getAttribute('data-symbol');
            
            if (targetSymbol !== currentActiveSymbol) {
                currentActiveSymbol = targetSymbol;
                
                // Reset nhanh giao diện về trạng thái chờ để người xem live biết hệ thống đang đổi mã
                document.getElementById("lbl-symbol").innerText = currentActiveSymbol;
                document.getElementById("lbl-name").innerText = currentActiveSymbol === "VN30F1M" ? "VN30 Index Futures Gần nhất" : "Chỉ số VN-INDEX Sàn HOSE";
                document.getElementById("txt-price").innerText = "--.--";
                document.getElementById("txt-change").innerText = "--.--";

                // Ẩn bớt hàng OI và KLNN nếu là VNINDEX (vì VNINDEX là chỉ số chung không có chỉ số này)
                if (currentActiveSymbol === "VNINDEX") {
                    document.getElementById("row-oi").style.display = "none";
                    document.getElementById("row-foreign").style.display = "none";
                } else {
                    document.getElementById("row-oi").style.display = "table-row";
                    document.getElementById("row-foreign").style.display = "table-row";
                }

                // Gọi cập nhật giá mới ngay lập tức không cần đợi bộ đếm setInterval
                fetchLivePriceData();
            }
        }

        // --- HÀM QUÉT GIÁ LINH HOẠT THEO MÃ ĐANG CHỌN ---
        async function fetchLivePriceData() {
            try {
                let apiUrl = "";
                if (currentActiveSymbol === "VN30F1M") {
                    // Cổng gọi danh sách phái sinh
                    apiUrl = "https://iboardquery.ssi.com.vn/v2/stock/exchange/DERIVATIVE";
                } else {
                    // Cổng gọi danh sách chỉ số (Index) bao gồm cả VNINDEX
                    apiUrl = "https://iboardquery.ssi.com.vn/v2/stock/exchange/INDEX";
                }

                const response = await fetch(apiUrl);
                if (!response.ok) return;
                const result = await response.json();
                
                if (result && result.data) {
                    // Tìm đúng mã mục tiêu trong mảng dữ liệu trả về từ SSI
                    // Cấu trúc SSI: Phái sinh dùng trường "ss", Chỉ số Index dùng trường "mc"
                    const d = result.data.find(item => (item.ss === currentActiveSymbol || item.mc === currentActiveSymbol));
                    if (d) {
                        updateLiveUI(d);
                    }
                }
            } catch (error) {
                console.log("Đang đồng bộ lại giá...", error);
            }
        }

        function updateLiveUI(d) {
            // Chuẩn hóa biến (SSI: Phái sinh và Cơ sở có ký hiệu trường hơi khác nhau đôi chút)
            const tc = d.c || d.vReference || 0; // Giá tham chiếu
            const price = d.lastPrice || d.vIndexValue || tc; // Giá hiện tại
            const change = d.vIndexChange !== undefined ? d.vIndexChange : (price - tc);
            const changePercent = d.vIndexChangePercent !== undefined ? d.vIndexChangePercent : (tc > 0 ? (change / tc) * 100 : 0);

            const txtPrice = document.getElementById("txt-price");
            const txtChange = document.getElementById("txt-change");
            
            // 1. Hiển thị Giá lớn (VNINDEX thường không có phần thập phân hoặc chỉ có 2 chữ số)
            txtPrice.innerText = currentActiveSymbol === "VN30F1M" ? price.toFixed(2) : price.toFixed(2);
            
            let colorClass = "c-tc";
            let arrow = "▪ ";
            if (change > 0) { colorClass = "c-up"; arrow = "▲ "; }
            else if (change < 0) { colorClass = "c-down"; arrow = "▼ "; }

            txtPrice.className = "price-now " + colorClass;
            txtChange.className = "price-change " + colorClass;
            txtChange.innerText = `${arrow}${Math.abs(change).toFixed(2)} (${changePercent.toFixed(2)}%)`;

            // 2. Điền các mốc thông số 3 cột (Trần - Sàn - TC)
            const ceiling = d.ce || d.vCeiling || 0;
            const floor = d.f || d.vFloor || 0;
            
            document.getElementById("txt-tc").innerText = tc > 0 ? tc.toFixed(1) : "--";
            document.getElementById("txt-ceiling").innerText = ceiling > 0 ? ceiling.toFixed(1) : "--";
            document.getElementById("txt-floor").innerText = floor > 0 ? floor.toFixed(1) : "--";
            
            // 3. Điền thông số bảng dưới
            const open = d.o || d.vOpen || 0;
            const high = d.h || d.vHighest || 0;
            const low = d.l || d.vLowest || 0;
            const volume = d.v || d.vTotalVolume || 0;

            document.getElementById("txt-open").innerText = open > 0 ? open.toFixed(2) : "--";
            document.getElementById("txt-high").innerText = high > 0 ? high.toFixed(2) : "--";
            document.getElementById("txt-low").innerText = low > 0 ? low.toFixed(2) : "--";
            if (high > 0 && low > 0) {
                document.getElementById("txt-avg").innerText = ((high + low) / 2).toFixed(2);
            }
            
            document.getElementById("txt-volume").innerText = volume > 0 ? volume.toLocaleString() : "--";
            
            // Riêng đối với Phái sinh VN30F1M mới nạp thêm dữ liệu OI và Nước ngoài
            if (currentActiveSymbol === "VN30F1M") {
                if(d.oi) document.getElementById("txt-oi").innerText = d.oi.toLocaleString();
                if(d.fb) document.getElementById("txt-f-buy").innerText = d.fb.toLocaleString();
                if(d.fs) document.getElementById("txt-f-sell").innerText = d.fs.toLocaleString();
            }
        }

        // Khởi động chạy lần đầu
        fetchLivePriceData();

        // Quét ngầm liên tục sau mỗi 2 giây
        setInterval(fetchLivePriceData, 2000);
    </script>
</body>
</html>
