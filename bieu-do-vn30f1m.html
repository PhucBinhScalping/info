<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ kỹ thuật Phái sinh - Phúc Bình Scalping</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #131722; color: #ffffff; font-family: Arial, sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }
        /* Thanh Header chính */
        .header {
            height: 45px; background-color: #1c2030; display: flex;
            align-items: center; padding: 0 20px; justify-content: space-between;
            border-bottom: 1px solid #2b3040; box-sizing: border-box;
        }
        .header .back-link {
            color: #ff9800; text-decoration: none; font-weight: bold; font-size: 14px;
        }
        
        /* Thanh Menu 3 Tab Con */
        .tab-menu {
            height: 40px; background-color: #171b26; display: flex;
            align-items: center; padding: 0 10px; gap: 5px;
            border-bottom: 1px solid #232733; box-sizing: border-box;
        }
        .tab-item {
            background: none; border: none; color: #d1d4dc; padding: 8px 16px;
            font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 4px;
            transition: 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .tab-item:hover {
            background-color: #2a2e39; color: #ffffff;
        }
        .tab-item.active {
            background-color: #242b42; color: #2962ff; border-bottom: 2px solid #2962ff;
            border-radius: 4px 4px 0 0;
        }

        /* Vùng nội dung chia đôi theo chiều ngang */
        .content-container {
            flex: 1; width: 100%; height: calc(100% - 85px); 
            display: flex; flex-direction: row; background-color: #131722;
        }
        
        /* Phần chứa Biểu đồ bên trái */
        .chart-section {
            flex: 1; height: 100%; position: relative;
        }
        .chart-wrapper {
            display: none; width: 100%; height: 100%;
        }
        .chart-wrapper.active {
            display: block;
        }
        iframe {
            width: 100%; height: 100%; border: none;
        }

        /* PHẦN PANEL LỊCH SỬ KHỚP LỆNH BÊN PHẢI */
        .sidebar-panel {
            width: 320px; height: 100%; background-color: #ffffff; color: #333333;
            border-left: 1px solid #e0e3eb; box-sizing: border-box;
            display: flex; flex-direction: column; padding: 0;
            overflow-y: auto;
        }
        
        /* Tiêu đề cố định */
        .sidebar-title {
            padding: 10px 12px; font-size: 13px; font-weight: bold; color: #1e2026;
            border-bottom: 1px solid #eee; background-color: #f8f9fa;
        }

        /* Bảng lịch sử khớp lệnh */
        .history-table {
            width: 100%; border-collapse: collapse; font-size: 13px; font-weight: bold;
        }
        .history-table tr {
            height: 30px; border-bottom: 1px solid #f1f1f1;
        }
        .history-table tr:nth-child(odd) {
            background-color: #fdfdfd;
        }
        .col-time { color: #666666; text-align: left; padding-left: 12px; width: 35%; }
        .col-price { text-align: right; width: 35%; padding-right: 15px; }
        .col-vol { text-align: right; padding-right: 15px; width: 20%; }
        .col-side { text-align: right; padding-right: 12px; width: 10%; }
        
        /* Màu chữ phe Mua/Bán */
        .text-buy { color: #00b060; }
        .text-sell { color: #ea0017; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-link" style="flex: 1; text-align: left;">⬅ Quay lại Trang chủ</a>
        <div style="flex: 2; text-align: center; font-size: 18px; font-weight: 500; color: #ffb700; letter-spacing: 0.5px;">
             Dữ liệu được lấy trực tiếp từ Công ty Cổ phần Chứng khoán VPS
        </div>
        <div style="flex: 1; text-align: right; font-size: 18px; font-weight: bold; color: #ffb700;">
            SĐT: 0853.525.379 - ID VPS: BOR5
        </div>
    </div>

    <div class="tab-menu">
        <button class="tab-item active" onclick="switchTab(event, 'vn30f1m_5m')">📊 VN30F1M (5 Phút)</button>
        <button class="tab-item" onclick="switchTab(event, 'vn30f1m_15m')">📊 VN30F1M (15 Phút)</button>
        <button class="tab-item" onclick="switchTab(event, 'vnindex')">📈 VNINDEX (Ngày)</button>
    </div>

    <div class="content-container">
        
        <div class="chart-section">
            <div id="vn30f1m_5m" class="chart-wrapper active">
                <iframe src="https://web5.vps.com.vn/?sym=VN30F1M&interval=5&theme=light&lang=vi"></iframe>
            </div>
            <div id="vn30f1m_15m" class="chart-wrapper">
                <iframe src="https://web5.vps.com.vn/?sym=VN30F1M&interval=15&theme=light&lang=vi"></iframe>
            </div>
            <div id="vnindex" class="chart-wrapper">
                <iframe src="https://web5.vps.com.vn/?sym=VNINDEX&interval=D&theme=light&lang=vi"></iframe>
            </div>
        </div>

        <div class="sidebar-panel">
            <div class="sidebar-title">⏱ Lịch sử khớp lệnh (VPS API)</div>
            <table class="history-table">
                <tbody id="history-rows">
                    <tr>
                        <td class="col-time" style="color:#999; font-weight:normal;">Đang tải dữ liệu VPS...</td>
                        <td class="col-price"></td>
                        <td class="col-vol"></td>
                        <td class="col-side"></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        function switchTab(event, tabId) {
            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.querySelectorAll('.chart-wrapper').forEach(chart => chart.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // --- CƠ CHẾ GỌI API TRỰC TIẾP TỪ LINK VPS ---
        async function fetchVPSIntraday() {
            const url = "https://web6.vps.com.vn/market_api.MarketApi/findSecIntraday";
            
            // Payload nhị phân/chuỗi đặc thù của gRPC-web để yêu cầu mã VN30F1M từ server VPS
            // Lưu ý: Cấu trúc này mô phỏng theo frame gRPC gửi lên của VPS
            const requestPayload = JSON.stringify({
                info: {
                    secType: "DERIVATIVE",
                    symbol: "VN30F1M"
                }
            });

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json",
                        // Một số API nội bộ yêu cầu thêm Token hoặc Origin của VPS, đoạn này chạy thử nghiệm:
                    },
                    body: requestPayload
                });

                if (!response.ok) {
                    throw new Error("Mạng lỗi hoặc bị chặn CORS bởi VPS");
                }

                const result = await response.json();
                
                // Giả định cấu trúc mảng trả về sau khi parse từ hàm findSecIntraday
                if (result && result.rows) {
                    // Lấy 16 lệnh mới nhất đưa lên đầu bảng
                    const latestRows = result.rows.slice(0, 16);
                    renderVPSTable(latestRows);
                }
            } catch (error) {
                console.error("Lỗi khi gọi API VPS:", error);
                // Hiển thị trạng thái lỗi lên bảng nếu bị chặn CORS
                document.getElementById("history-rows").innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align:center; color:red; padding:20px; font-size:12px;">
                            Không thể kết nối trực tiếp API VPS (Bị chặn CORS)<br>
                            Vui lòng kiểm tra tab F12 Console để xem chi tiết.
                        </td>
                    </tr>
                `;
            }
        }

        function renderVPSTable(rows) {
            const tbody = document.getElementById("history-rows");
            let html = "";

            rows.forEach(row => {
                // Ánh xạ các trường dữ liệu giả định từ cấu trúc Intraday VPS
                const time = row.time || row[0] || "00:00:00";
                const price = parseFloat(row.price || row[1] || 0).toFixed(2);
                const vol = row.vol || row[2] || 0;
                const side = row.side || row[3] || "B"; // Mua hoặc Bán
                
                const sideText = (side === "BUY" || side === "B" || side === "M") ? "M" : "B";
                const classColor = sideText === "M" ? "text-buy" : "text-sell";

                html += `
                    <tr>
                        <td class="col-time">${time}</td>
                        <td class="col-price ${classColor}">${price}</td>
                        <td class="col-vol ${classColor}">${vol}</td>
                        <td class="col-side ${classColor}">${sideText}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Tải dữ liệu lần đầu
        fetchVPSIntraday();

        // Cứ mỗi 3 giây gọi API lặp lại một lần để cập nhật lịch sử khớp lệnh mới
        setInterval(fetchVPSIntraday, 3000);
    </script>

</body>
</html>
