<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ kỹ thuật Phái sinh - Phúc Bình Scalping</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; overflow: hidden; background: #ffffff; }
        
        /* Header */
        .header { height: 45px; background-color: #f0f3fa; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #e0e3eb; }
        
        /* Menu Tab */
        .tab-menu { height: 45px; background: #ffffff; display: flex; align-items: center; padding: 0 10px; gap: 5px; border-bottom: 1px solid #e0e3eb; overflow-x: auto; }
        .tab-item { background: #f0f3fa; border: none; padding: 8px 12px; font-size: 13px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .tab-item.active { background: #e3f2fd; color: #1565c0; font-weight: bold; border-bottom: 2px solid #1565c0; }
        
        /* Nút chức năng */
        .close-btn { color: #888; font-weight: bold; cursor: pointer; padding: 0 4px; border-radius: 50%; }
        .close-btn:hover { color: red; background: #ffebee; }
        .btn-add { background: #e8f5e9; color: #2e7d32; border: 1px dashed #2e7d32; padding: 5px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        
        /* Nội dung */
        .content-container { flex: 1; display: flex; }
        .tab-content-block { display: none; width: 100%; height: 100%; }
        .tab-content-block.active { display: flex; }
        .chart-section { flex: 1; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="color: #ffb700; font-weight: bold;">PHÚC BÌNH SCALPING</div>
        <div style="font-weight: bold; color: #ffb700;">SĐT: 0853.525.379</div>
    </div>

    <div class="tab-menu" id="mainTabMenu">
        <button class="tab-item active" id="tab_base" onclick="switchTab(event, 'block_base', 'VN30F1M')">📊 VN30F1M (5p)</button>
        <button class="btn-add" onclick="addNewChart()">+ Thêm</button>
    </div>

    <div class="content-container" id="mainContent">
        <div id="block_base" class="tab-content-block active">
            <div class="chart-section"><iframe src="https://chart.vps.com.vn/tv/?symbol=VN30F1M&resolution=5&lang=vi&theme=light"></iframe></div>
        </div>
    </div>

<script>
    // Hàm chuyển tab
    function switchTab(event, blockId, symbol) {
        // Nếu bấm vào nút đóng thì không chuyển tab
        if (event.target.classList.contains('close-btn')) return;

        document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        document.querySelectorAll('.tab-content-block').forEach(block => block.classList.remove('active'));
        document.getElementById(blockId).classList.add('active');
    }

    // Hàm thêm biểu đồ mặc định
    function addNewChart() {
        const id = "chart_" + Date.now();
        const symbol = "VN30F1M"; 
        
        // Tạo tab mới
        const newTab = document.createElement("button");
        newTab.className = "tab-item";
        newTab.innerHTML = `📊 ${symbol} (5p) <span class="close-btn" onclick="removeChart('${id}')">×</span>`;
        newTab.onclick = (e) => switchTab(e, id, symbol);
        document.getElementById("mainTabMenu").insertBefore(newTab, document.querySelector(".btn-add"));
        
        // Tạo nội dung iframe mới
        const newContent = document.createElement("div");
        newContent.id = id;
        newContent.className = "tab-content-block";
        newContent.innerHTML = `<div class="chart-section"><iframe src="https://chart.vps.com.vn/tv/?symbol=${symbol}&resolution=D&lang=vi&theme=light"></iframe></div>`;
        document.getElementById("mainContent").appendChild(newContent);
    }

    // Hàm đóng biểu đồ
    function removeChart(id) {
        const tab = document.querySelector(`button[onclick*="${id}"]`);
        const content = document.getElementById(id);
        
        if (tab) tab.remove();
        if (content) content.remove();
        
        // Chuyển về tab đầu tiên nếu đang ở tab bị đóng
        document.getElementById("tab_base").click();
    }
</script>
</body>
</html>
