<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ kỹ thuật Phái sinh - Phúc Bình Scalping</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #131722; color: #ffffff; font-family: Arial, sans-serif;
            display: flex; flex-direction: column;
        }
        /* Thanh Header chính */
        .header {
            height: 45px; background-color: #1c2030; display: flex;
            align-items: center; padding: 0 20px; justify-content: space-between;
            border-bottom: 1px solid #2b3040;
        }
        .header .back-link {
            color: #ff9800; text-decoration: none; font-weight: bold; font-size: 14px;
        }
        
        /* Thanh Menu 3 Tab Con thiết kế theo phong cách TradingView/FireAnt */
        .tab-menu {
            height: 40px; background-color: #171b26; display: flex;
            align-items: center; padding: 0 10px; gap: 5px;
            border-bottom: 1px solid #232733;
        }
        .tab-item {
            background: none; border: none; color: #d1d4dc; padding: 8px 16px;
            font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 4px;
            transition: 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .tab-item:hover {
            background-color: #2a2e39; color: #ffffff;
        }
        /* Tab đang được chọn kích hoạt */
        .tab-item.active {
            background-color: #242b42; color: #2962ff; border-bottom: 2px solid #2962ff;
            border-radius: 4px 4px 0 0;
        }

        /* Vùng nội dung hiển thị phía dưới */
        .content-container {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 20px; box-sizing: border-box;
        }
        .info-box {
            max-width: 500px; background-color: #1c2030; padding: 30px;
            border-radius: 8px; border: 1px solid #2b3040;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .btn-open {
            display: inline-block; margin-top: 20px; background-color: #ff9800;
            color: white; padding: 12px 28px; text-decoration: none;
            border-radius: 5px; font-weight: bold; font-size: 15px;
            box-shadow: 0 4px 15px rgba(255,152,0,0.3); transition: 0.3s;
        }
        .btn-open:hover { background-color: #ffa726; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-link">⬅ Quay lại Trang chủ nhận lệnh Bot</a>
        <div style="font-size: 14px; font-weight: bold; color: #9194a1;">ID VPS: BOR5</div>
    </div>

    <div class="tab-menu">
        <button class="tab-item active" onclick="switchTab('vn30f1m_5m')">📊 VN30F1M (5 Phút)</button>
        <button class="tab-item" onclick="switchTab('vn30f1m_15m')">📊 VN30F1M (15 Phút)</button>
        <button class="tab-item" onclick="switchTab('vnindex')">📈 VNINDEX (Ngày)</button>
    </div>

    <div class="content-container">
        <div class="info-box">
            <h3 id="display-title" style="margin-top:0; color: #fff;">Biểu đồ Hợp đồng tương lai VN30F1M - Khung 5M</h3>
            <p id="display-desc" style="color: #9194a1; font-size: 14px; line-height: 1.5;">
                Hệ thống tự động liên kết đến luồng dữ liệu thời gian thực bảo mật cao của VPS. B bấm vào nút dưới đây để theo dõi nến chạy.
            </p>
            <a href="https://web5.vps.com.vn/?sym=VN30F1M&interval=5&theme=dark&lang=vi" id="action-button" target="_blank" class="btn-open">
                ⚡ Mở Đồ Thị 5 Phút Real-time
            </a>
        </div>
    </div>

    <script>
        // Cấu hình đường link gốc an toàn của VPS cho từng mục con
        const links = {
            vn30f1m_5m: {
                title: "Biểu đồ Hợp đồng tương lai VN30F1M - Khung 5 Phút",
                desc: "Hệ thống tự động liên kết đến luồng dữ liệu thời gian thực bảo mật cao của VPS. Bạn bấm vào nút dưới đây để theo dõi nến chạy.",
                url: "https://web5.vps.com.vn/?sym=VN30F1M&interval=5&theme=dark&lang=vi"
            },
            vn30f1m_15m: {
                title: "Biểu đồ Hợp đồng tương lai VN30F1M - Khung 15 Phút",
                desc: "Theo dõi xu hướng trung hạn của phái sinh thông qua biểu đồ nến 15 phút từ máy chủ hệ thống VPS.",
                url: "https://web5.vps.com.vn/?sym=VN30F1M&interval=15&theme=dark&lang=vi"
            },
            vnindex: {
                title: "Biểu đồ Chỉ số Cơ sở VN-INDEX - Khung Ngày (1D)",
                desc: "Soi dòng tiền và xu hướng tổng quan của toàn bộ thị trường chứng khoán cơ sở Việt Nam.",
                url: "https://web5.vps.com.vn/?sym=VNINDEX&interval=D&theme=dark&lang=vi"
            }
        };

        function switchTab(tabId) {
            // Đổi trạng thái hiển thị active của nút bấm menu con
            document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Cập nhật nội dung text và nút bấm tương ứng với tab được click
            document.getElementById('display-title').innerText = links[tabId].title;
            document.getElementById('display-desc').innerText = links[tabId].desc;
            
            const actionBtn = document.getElementById('action-button');
            actionBtn.href = links[tabId].url;
            actionBtn.innerText = "⚡ Mở " + (tabId === 'vnindex' ? "Đồ Thị VN-INDEX" : "Đồ Thị " + (tabId === 'vn30f1m_5m' ? "5 Phút" : "15 Phút")) + " Real-time";
        }
    </script>

</body>
</html>
