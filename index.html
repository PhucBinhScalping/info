<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phúc Bình Scalping</title>
    <style>
        /* Nền chuyển sắc chuẩn theo ảnh gốc từ Vàng Cam sang Đỏ */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(to right, #e6931e, #df372a);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .wrapper {
            max-width: 580px;
            width: 100%;
            text-align: center;
        }

        /* Avatar tròn */
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }

        /* Tiêu đề tên */
        h1 {
            font-size: 28px;
            color: #000000;
            margin: 0 0 20px 0;
            font-weight: 500;
        }

        /* Danh sách các ô link */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Khung bọc chung cho tất cả các ô */
        .card-item {
            background-color: rgba(255, 255, 255, 0.65);
            border-radius: 8px;
            text-decoration: none;
            color: #000000;
            display: flex;
            align-items: center;
            position: relative;
            min-height: 54px;
            box-sizing: border-box;
            transition: transform 0.2s, background-color 0.2s;
        }

        .card-item:hover {
            transform: scale(1.01);
            background-color: rgba(255, 255, 255, 0.75);
        }

        /* Ô thông tin ID VPS phía trên (không bấm được) */
        .info-box {
            padding: 12px;
            justify-content: center;
            flex-direction: column;
            font-size: 15px;
            line-height: 1.4;
            font-weight: 500;
        }

        /* Icon bên trái của các nút bấm */
        .card-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
            position: absolute;
            left: 7px;
            border-radius: 4px;
            background: #fff; /* Giúp các icon luôn nổi bật */
        }

        /* Chữ của nút bấm nằm ở giữa */
        .card-text {
            width: 100%;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            padding: 0 50px; /* Tránh chữ đè vào icon */
        }

        /* Dòng chữ bản quyền nhỏ dưới cùng */
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="logo.png" alt="Phúc Bình Scalping" class="avatar">
        
        <h1>Phúc Bình Scalping</h1>
        
        <div class="links-list">
            <div class="card-item info-box">
                <div>TVĐT Chứng khoán Việt Nam</div>
                <div>ID VPS: BOR5 - NGUYỄN PHÚC BÌNH</div>
            </div>

            <a href="#" target="_blank" class="card-item">
                <img src="icon-vps.png" class="card-icon" alt="VPS">
                <span class="card-text">Mở Tài khoản Chứng khoán chỉ 2 phút</span>
            </a>

            <a href="#" target="_blank" class="card-item">
                <img src="icon-zalo.png" class="card-icon" alt="Zalo">
                <span class="card-text">Room Cộng Đồng Phái Sinh</span>
            </a>

            <a href="#" target="_blank" class="card-item">
                <img src="icon-youtube.png" class="card-icon" alt="Youtube">
                <span class="card-text">Youtube</span>
            </a>

            <a href="#" target="_blank" class="card-item">
                <img src="icon-tiktok.png" class="card-icon" alt="TikTok">
                <span class="card-text">TikTok</span>
            </a>

            <a href="#" target="_blank" class="card-item">
                <img src="icon-drive.png" class="card-icon" alt="Drive">
                <span class="card-text">Phần mềm Phái Sinh</span>
            </a>
        </div>

        <div class="footer">
        </div>
    </div>

</body>
</html>
